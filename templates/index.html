<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Spam SMS Classifier</title>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #0f172a;
        margin: 0;
        padding: 0;
        color: #e2e8f0;
    }

    .container {
        width: 420px;
        margin: 100px auto;
        background: rgba(15, 23, 42, 0.9);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        text-align: center;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
        margin-bottom: 20px;
        color: #f8fafc;
        letter-spacing: 1px;
    }

    textarea {
        width: 100%;
        height: 120px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #334155;
        resize: none;
        font-size: 14px;
        background: #020617;
        color: #e2e8f0;
        outline: none;
        transition: 0.3s;
    }

    textarea:focus {
        border-color: #6366f1;
        box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
    }

    button {
        margin-top: 18px;
        padding: 12px 25px;
        border: none;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s ease;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
    }

    .result {
        margin-top: 25px;
        font-size: 22px;
        font-weight: bold;
        padding: 10px;
        border-radius: 8px;
    }

    .spam {
        color: #ff4d4d;
        background: rgba(255, 77, 77, 0.1);
        border: 1px solid rgba(255, 77, 77, 0.4);
    }

    .not-spam {
        color: #22c55e;
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.4);
    }
</style>
    
</head>
<body>

<div class="container">
    <h1>Spam SMS Classifier</h1>

    <form method="POST">
<textarea name="message" placeholder="Enter your message here..." required>{{ message | default('') }}</textarea>        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <div class="result 
            {% if prediction == 'Spam' %}spam{% else %}not-spam{% endif %}">
            {{ prediction }}
        </div>
    {% endif %}
</div>
<center>
<footer style="text-align: center; margin-top: 50px; color: white;">
    &copy; 2026 Spam Classifier. Build By Madiha Muskan.
</footer>
</center>
</body>
</html>
