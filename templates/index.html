<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spam Classifier</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: lightgray;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            resize: none;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .spam {
            color: red;
        }

        .not-spam {
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Spam Classifier</h1>

    <form method="POST">
<textarea name="message" placeholder="Enter your message here..." required>{{ message | default('') }}</textarea>        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <div class="result 
            {% if prediction == 'Spam' %}spam{% else %}not-spam{% endif %}">
            {{ prediction }}
        </div>
    {% endif %}
</div>
<footer style="text-align: center; margin-top: 50px; color: #fff;">
    &copy; 2026 Spam Classifier. Build By Madiha Muskan.
</body>
</html>
